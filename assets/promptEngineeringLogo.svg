<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="promptGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#306cc4" />
      <stop offset="50%" stop-color="#807ae8" />
      <stop offset="100%" stop-color="#5eead4" />
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4" />
      <stop offset="100%" stop-color="#a89ff5" />
    </linearGradient>
  </defs>
  
  <rect x="10" y="20" width="80" height="60" rx="12" stroke="url(#promptGrad)" stroke-width="6" stroke-linejoin="round"/>
  
  <!-- Little tail for chat bubble -->
  <path d="M 30 80 L 20 95 L 40 80 Z" fill="url(#promptGrad)" />
  
  <!-- Greater than sign -->
  <path d="M 25 35 L 40 50 L 25 65" stroke="url(#promptGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Cursor line -->
  <line x1="45" y1="65" x2="60" y2="65" stroke="url(#promptGrad)" stroke-width="6" stroke-linecap="round" />
  
  <!-- Sparkles for AI -->
  <path d="M 75 15 Q 75 25 85 25 Q 75 25 75 35 Q 75 25 65 25 Q 75 25 75 15 Z" fill="url(#sparkGrad)" />
  <path d="M 60 10 Q 60 15 65 15 Q 60 15 60 20 Q 60 15 55 15 Q 60 15 60 10 Z" fill="url(#sparkGrad)" />
</svg>
